relizaprops:
  # CSV allowlist of Keycloak client ids (token `azp`) accepted by the resource
  # server. Binds JWTs to known first-party clients; a token minted for any other
  # client in the same realm is rejected. Default: the SPA login client.
  jwtAllowedAzp: ${JWT_ALLOWED_AZP:login-app}
  # Audience (aud) validation. OFF by default -- only enable once Keycloak issues
  # tokens carrying this audience (the login-app oidc-audience-mapper); enabling it
  # before the mapper is live rejects every token.
  jwtValidateAudience: ${JWT_VALIDATE_AUDIENCE:false}
  jwtAudience: ${JWT_AUDIENCE:rearm-backend}
  protocol: ${PROJECT_PROTOCOL:http}
  baseuri: ${PROJECT_PROTOCOL:http}://${PROJECT_HOST:localhost:3000}
  rebom:
    url: ${RELIZAPROP_REBOM_URI:http://[::1]:4000/}
  encryption:
    password: ${RELIZAPROP_PASS:pleasechange}
    salt: ${RELIZAPROP_SALT:aaaaaaaa}
    oldpassword: ${RELIZAPROP_PASS_OLD:pleasechange}
    oldsalt: ${RELIZAPROP_SALT_OLD:aaaaaaaa}
  rejectPendingReleasesRate: ${RELIZAPROP_REJECT_PENDING_RELEASES_RATE:PT15M} #ISO 8601
  # Cadence of the change-driven "today" analytics refresh (findings-over-time
  # chart write side). Worst-case chart staleness after a metrics change; the
  # tick is near-free for orgs with no changes (one grouped signal query).
  analyticsTodayRefreshRate: ${ANALYTICS_TODAY_REFRESH_RATE:PT15M} #ISO 8601
  installationSecret: ${RELIZAPROP_INSTALLATION_SECRET:r3liza}
  installationType: OSS
  # The AGGREGATED changelog "Finding Changes" views run the posture-endpoint diff
  # instead of the legacy pairwise release-diff. Per-org safety: an org serves the
  # legacy path until its finding_change_events backfill watermark is certified at
  # the current vocabulary version. Set CHANGELOG_POSTURE_DIFF_ENABLED=false to
  # force the legacy path instance-wide (rollback lever; no data loss).
  changelogPostureDiffEnabled: ${CHANGELOG_POSTURE_DIFF_ENABLED:true}
  # Notification pipeline drains (shared scheduler): events fanned out and channel
  # deliveries dispatched per 5s tick.
  notificationOutboxBatch: ${NOTIFICATION_OUTBOX_BATCH:50}
  notificationDeliveryBatch: ${NOTIFICATION_DELIVERY_BATCH:50}
  # Resumable finding-change v3 backfill drain (shared scheduler): kill switch and
  # max branches drained per 60s tick.
  findingChangeV3BackfillDrainEnabled: ${FINDING_CHANGE_V3_BACKFILL_DRAIN_ENABLED:true}
  findingChangeV3BackfillBatchPerTick: ${FINDING_CHANGE_V3_BACKFILL_BATCH_PER_TICK:5}
  enableBetaTea: ${RELIZAPROP_ENABLE_BETA_TEA:false}
#spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.format_sql=true
#logging.level.org.hibernate.SQL=DEBUG
#logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
  ociArtifacts:
    namespace: ${RELIZAPROP_OCIARTIFACTS_REGISTRY_NAMESPACE:mynamespace}
    serviceUrl: ${RELIZAPROP_OCIARTIFACTS_SERVICE_HOST:http://[::1]:8083/}
  enableDtrackCleanupScheduler: ${ENABLE_DTRACK_CLEANUP_SCHEDULER:false}