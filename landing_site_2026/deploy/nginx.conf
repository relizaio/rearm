server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # directory-format static export: /blog/slug/ -> /blog/slug/index.html
    # HTML must revalidate on every load (no-cache != no-store: browsers still
    # get 304s via ETag) so redesign iterations and content updates propagate
    # immediately instead of being pinned by heuristic caching.
    location / {
        try_files $uri $uri/index.html $uri/ =404;
        add_header Cache-Control "no-cache";
    }

    # images and other static media: cacheable for a day, then revalidate
    location ~* \.(png|jpg|jpeg|webp|svg|ico|gif|mp4)$ {
        add_header Cache-Control "public, max-age=86400";
    }

    # long-cache hashed astro assets
    location /_astro/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
