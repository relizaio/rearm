apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-backend
  namespace: {{ .Release.Namespace }}
  labels:
    name: rearm-backend
    app: rearm
    {{- include "rearm.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backendReplicaCount }}
  selector:
    matchLabels:
      {{- include "rearm.selectorLabels" . | nindent 6 }}
      name: rearm-backend-pod
  template:
    metadata:
      labels:
        {{- include "rearm.selectorLabels" . | nindent 8 }}
        name: rearm-backend-pod
        servicehook: {{ .Release.Name }}-backend
    spec:
      # Allow the old pod to drain in-flight requests on rollout/scale-down:
      # preStop sleep (after endpoint removal) + graceful shutdown must fit
      # inside this window.
      terminationGracePeriodSeconds: {{ .Values.backend.terminationGracePeriodSeconds | default 45 }}
    {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
    {{- end }}
      containers:
        - name: {{ .Release.Name }}-backend
          image: "{{ .Values.image.backEndImage }}"
          env:
            - name: RELIZAPROP_REBOM_URI
              value: http://{{ .Release.Name }}-rebom-backend-service:4000/
            - name: RELIZAPROP_REBOM_ENABLED
              value: {{ .Values.rebom.enabled | quote }}
            - name: RELIZAPROP_OCIARTIFACTS_REGISTRY_NAMESPACE
              value: {{ .Values.rebom.backend.oci.registryNamespace }}
            - name: RELIZAPROP_OCIARTIFACTS_SERVICE_HOST
              value: http://{{ .Release.Name }}-oci-artifact
            - name: RELIZAPROP_INSTALLATION_TYPE
              value: "OSS"
            - name: RELIZAPROP_ENABLE_BETA_TEA
              value: {{ .Values.enableBetaTea | default "false" | quote }}
            - name: PG_HOST
              value: {{ if .Values.use_external_postgres }}{{ .Values.rearm_postgres_host }}{{ else }}{{ .Release.Name }}-postgresql{{ end }}
            - name: PG_PORT
              value: {{ .Values.rearm_postgres_port | quote}}
            - name: PG_DATABASE
              value: {{ .Values.rearm_postgres_database }}
            - name: PG_USER
              value: {{ .Values.rearm_postgres_username }}
            - name: PROJECT_PROTOCOL
              value: {{ .Values.projectProtocol }}
            - name: PROJECT_HOST
              value: {{ .Values.projectHost }}
            - name: MAX_UPLOAD_SIZE
              value: {{ .Values.max_upload_size_in_MB }}MB
              # aws account below is used for secret storage if enabled
            - name: RELIZAPROP_INSTALLATION_SECRET
              valueFrom:
                secretKeyRef:
                  name: system-secret
                  key: systemSecret
            - name: KEYCLOAK_ISSUER_URI
              value: {{ .Values.keycloak.issuer_uri }}
            - name: KEYCLOAK_SET_URI
              value: {{ .Values.keycloak.set_uri }}
            - name: JWT_ALLOWED_AZP
              value: {{ (.Values.keycloak.jwt).allowedAzp | default "login-app" | quote }}
            - name: JWT_VALIDATE_AUDIENCE
              value: {{ (.Values.keycloak.jwt).validateAudience | default false | quote }}
            - name: JWT_AUDIENCE
              value: {{ (.Values.keycloak.jwt).audience | default "rearm-backend" | quote }}
{{- if not .Values.useDefaultSecrets}}
            - name: PG_PASS
              valueFrom:
                secretKeyRef:
                  name: pgpassword
                  key: postgres-password
            - name: RELIZAPROP_PASS
              valueFrom:
                secretKeyRef:
                  name: reliza-props
                  key: encryption-pass
            - name: RELIZAPROP_SALT
              valueFrom:
                secretKeyRef:
                  name: reliza-props
                  key: encryption-salt
            - name: RELIZAPROP_PASS_OLD
              valueFrom:
                secretKeyRef:
                  name: reliza-props
                  key: encryption-pass-old
            - name: RELIZAPROP_SALT_OLD
              valueFrom:
                secretKeyRef:
                  name: reliza-props
                  key: encryption-salt-old
{{- end }}
            - name: LOG_FORMAT_TYPE
              value: {{ .Values.backend.logFormatType }}
            - name: ENABLE_DTRACK_CLEANUP_SCHEDULER
              value: {{ .Values.backend.enableDtrackCleanupScheduler | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8086
              protocol: TCP
          # /api/healthCheck runs a real DB query (fetches the external-proj
          # org), so it returns OK only once Spring is up AND the DB is
          # reachable — exactly what startup/readiness should mean.
          # startupProbe covers slow boot (Flyway etc.); while it runs both
          # readiness and liveness are suppressed.
          startupProbe:
            httpGet:
              path: /api/healthCheck
              port: http
            periodSeconds: {{ .Values.backend.startupPeriodSeconds | default 5 }}
            timeoutSeconds: 3
            failureThreshold: {{ .Values.backend.startupFailureThreshold | default 60 }}
          # Liveness is intentionally a tcpSocket check, NOT the DB-backed
          # /api/healthCheck: liveness should only answer "is the JVM wedged?"
          # A DB-coupled liveness probe would restart every replica on a
          # transient DB blip (a restart storm that can't fix the DB).
          # Generous failureThreshold so a long GC pause won't trip it.
          livenessProbe:
            tcpSocket:
              port: http
            periodSeconds: {{ .Values.backend.livenessPeriodSeconds | default 10 }}
            timeoutSeconds: 3
            failureThreshold: {{ .Values.backend.livenessFailureThreshold | default 6 }}
          readinessProbe:
            httpGet:
              path: /api/healthCheck
              port: http
            periodSeconds: {{ .Values.backend.readinessPeriodSeconds | default 10 }}
            timeoutSeconds: 3
            failureThreshold: 3
          lifecycle:
            preStop:
              # Sleep after the pod is removed from Service endpoints so
              # in-flight/just-routed requests still hit it; SIGTERM (and
              # Spring graceful shutdown) follow once this returns.
              exec:
                command: ["sh", "-c", "sleep {{ .Values.backend.preStopSleepSeconds | default 10 }}"]
          resources:
            {{- toYaml .Values.backendService.resources | nindent 12 }}

---

apiVersion: v1
kind: Secret
metadata:
  name: system-secret
  namespace: {{ .Release.Namespace }}
type: Opaque
data:
  systemSecret: {{ randAlphaNum 24 | nospace | b64enc | quote }}