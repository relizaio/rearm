services:
  rearm-core:
    image: registry.relizahub.com/library/rearm-backend:26.05.35@sha256:cb852201a6b6ba77b96908517712e29e1578c40e2b854161cdfff211a65bdf29
    # Legacy core.env kept for one release for backward compatibility --
    # prefer the OCI_* variables in .env (see .env.example).
    env_file:
     - path: ./core.env
       required: false
    environment:
     - PG_HOST=rearm-postgresql
     - PG_PORT=5432
     - PG_PASS=${REARM_PG_PASS:-relizaPass}
     - RELIZAPROP_OCIARTIFACTS_REGISTRY_NAMESPACE=${OCI_REGISTRY_NAMESPACE:-rearm}
     - PROJECT_PROTOCOL=${REARM_PROTOCOL:-http}
     - PROJECT_HOST=${REARM_HOST:-localhost:8092}
     - KEYCLOAK_ISSUER_URI=${REARM_PROTOCOL:-http}://${REARM_HOST:-localhost:8092}
     - KEYCLOAK_SET_URI=http://keycloak:9080
     - RELIZAPROP_REBOM_URI=http://rebom-backend:4000/
     - RELIZAPROP_OCIARTIFACTS_SERVICE_HOST=oci-artifact-service
     - MAX_UPLOAD_SIZE=50MB
    depends_on:
     - rearm-postgresql
     - keycloak
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s
  rearm-ui:
    image: registry.relizahub.com/library/rearm-ui:26.05.78@sha256:5cbfc333392b8db2e08c5e2aa0462f84ea93bb5bfce62e7b6111be28ff3c2b79
    ports:
     - "8092:80"
    environment:
     - MAX_BODY_SIZE=50M
     - HUB_HOST=rearm-core
     - HUB_PORT=8086
     - PROJECT_ORIGIN=${REARM_PROTOCOL:-http}://${REARM_HOST:-localhost:8092}
     - KEYCLOAK_HOST=keycloak
     - KEYCLOAK_PORT=9080
     - KEYCLOAK_ADMIN_ACCESS=
     - KEYCLOAK_RELIZA_ADMIN_ACCESS=
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s
    depends_on:
     - rearm-core
  rearm-postgresql:
    image: registry.relizahub.com/library/rearm-postgres:0.1.6@sha256:7c3d99ee4d4bbfb9a784f4e35e653aea07ebdf4ce32cd90f85fd888e717612ee
    ports:
     # Bound to loopback by default -- this is a convenience port with a
     # well-known default password. Override REARM_PG_BIND (e.g. 0.0.0.0)
     # only if you need remote DB access and have changed the password.
     - "${REARM_PG_BIND:-127.0.0.1}:5440:5432"
    environment:
     - POSTGRES_PASSWORD=${REARM_PG_PASS:-relizaPass}
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    volumes:
      - "rearm-postgres-data:/relizaio/postgresql"
  keycloak:
    image: registry.relizahub.com/library/rearm-keycloak:26.03.5@sha256:ed3e5bab4642842612e20409704bdf09f0605e8f156069f4756396ef7afaa5b5
    # build: ../../keycloak
    ports:
     - "9080:9080"
    environment:
     - KC_DB=postgres
     - KC_DB_SCHEMA=reliza_keycloak
     - KC_DB_USERNAME=postgres
     - KC_DB_PASSWORD=${KEYCLOAK_PG_PASS:-relizaPass}
     - KC_DB_URL=jdbc:postgresql://keycloak-postgres:5432/postgres
     - KEYCLOAK_ADMIN=admin
     - KEYCLOAK_ADMIN_PASSWORD=admin
     - KC_HTTP_RELATIVE_PATH=kauth
     - KC_HEALTH_ENABLED=true
    entrypoint:
     - /bin/sh
     - -c
     # The imported realm's login-app client pins its redirect URIs / web
     # origins to http://localhost:8092 -- rewrite them to the external
     # origin before the import so login works on any host. NB:
     # --import-realm only seeds a realm that does not exist yet, so
     # changing REARM_HOST later requires wiping the keycloak volume
     # (docker compose down -v; destroys users) or editing the login-app
     # client in the Keycloak admin console.
     - RF=$$(ls /opt/keycloak/data/import/*reliza-realm*.json | head -1) && sed "s#http://localhost:8092#${REARM_PROTOCOL:-http}://${REARM_HOST:-localhost:8092}#g" "$$RF" > /tmp/realm.json && cp /tmp/realm.json "$$RF" && /opt/keycloak/bin/kc.sh start --import-realm --http-enabled true --hostname-strict false --http-host 0.0.0.0 --http-port 9080 --hostname ${REARM_PROTOCOL:-http}://${REARM_HOST:-localhost:8092}/kauth
    depends_on:
     - keycloak-postgres
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s
  keycloak-postgres:
    image: registry.relizahub.com/library/rearm-postgres:0.1.6@sha256:7c3d99ee4d4bbfb9a784f4e35e653aea07ebdf4ce32cd90f85fd888e717612ee
    environment:
     - POSTGRES_PASSWORD=${KEYCLOAK_PG_PASS:-relizaPass}
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    volumes:
      - ./postgres-keycloak-init.sql:/docker-entrypoint-initdb.d/init.sql
      - "rearm-keycloak-compose-postgres-data:/relizaio/postgresql"
  oci-artifact-service:
    image: registry.relizahub.com/library/rearm-oci-artifact-service:26.03.12@sha256:fc00a0d8e3dfbf513e6e2bdc18d93047f1b76da7014cbb9d1f2483a187bc69dc
    # Legacy oci.env kept for one release for backward compatibility --
    # prefer the OCI_* variables in .env (see .env.example).
    env_file:
     - path: ./oci.env
       required: false
    environment:
     # Defaults target the bundled zot registry below. To use an external
     # registry instead, set OCI_REGISTRY_HOST / _USERNAME / _TOKEN in
     # .env AND OCI_USE_PLAIN_HTTP=false (the plain-http default only
     # suits the in-network zot).
     - REGISTRY_HOST=${OCI_REGISTRY_HOST:-zot:5000}
     - REGISTRY_USERNAME=${OCI_REGISTRY_USERNAME:-rearm}
     - REGISTRY_TOKEN=${OCI_REGISTRY_TOKEN:-zotRegistryPass}
     - USE_PLAIN_HTTP=${OCI_USE_PLAIN_HTTP:-true}
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s
  # Bundled local OCI registry for artifact storage, on by default and
  # reachable only on the compose network (no published ports). Disable
  # with OCI_BUNDLED_REGISTRY_REPLICAS=0 in .env when pointing the OCI_*
  # variables at an external registry. Storage profile is tuned for the
  # ReARM access pattern (push once, fetch by digest, no deletes): dedupe
  # off, GC off, no UI/search extensions (zot-minimal image).
  # NB: like traefik below, zot needs an inotify instance at startup; on
  # hosts with exhausted inotify instances it exits with "couldn't
  # initialize inotify" -- raise fs.inotify.max_user_instances.
  zot-htpasswd:
    image: httpd:2.4-alpine@sha256:1b766f17b84026429b7cb243317b142921b24432336e798bc881c43f45ed9567
    entrypoint: ["/bin/sh", "-c"]
    # Regenerated from the OCI_* variables on every start, so a credential
    # change in .env takes effect on the next `up`.
    command: ["htpasswd -Bbc /auth/htpasswd \"$${REGISTRY_USER}\" \"$${REGISTRY_PASS}\""]
    environment:
     - REGISTRY_USER=${OCI_REGISTRY_USERNAME:-rearm}
     - REGISTRY_PASS=${OCI_REGISTRY_TOKEN:-zotRegistryPass}
    volumes:
     - rearm-zot-auth:/auth
    deploy:
      replicas: ${OCI_BUNDLED_REGISTRY_REPLICAS:-1}
      restart_policy:
        condition: none
  zot:
    image: ghcr.io/project-zot/zot-minimal:v2.1.18@sha256:892f2a5a63dd99bdf85320fee5448506119328a6d5e1a2d14d4db876be595236
    command: ["serve", "/etc/zot/config.json"]
    volumes:
     - ./zot-config.json:/etc/zot/config.json:ro
     - rearm-zot-auth:/etc/zot/auth:ro
     - rearm-zot-data:/var/lib/zot
    depends_on:
      zot-htpasswd:
        condition: service_completed_successfully
    deploy:
      replicas: ${OCI_BUNDLED_REGISTRY_REPLICAS:-1}
      restart_policy:
        condition: on-failure
  rebom-backend:
    image: registry.relizahub.com/library/rebom-backend:0.20.4@sha256:1b75c28fe1fa2e28b25b2fdd80e2cbd1cc43751b64657020cf6e87c7428e6dc3
    # Legacy rebom.env kept for one release for backward compatibility --
    # prefer the OCI_* variables in .env (see .env.example).
    env_file:
     - path: ./rebom.env
       required: false
    environment:
     - POSTGRES_HOST=rebom-postgresql
     - POSTGRES_PORT=5432
     - POSTGRES_PASSWORD=${REBOM_PG_PASS:-relizaPass}
     - OCIARTIFACTS_REGISTRY_NAMESPACE=${OCI_REGISTRY_NAMESPACE:-rearm}
     - OCI_STORAGE_ENABLED=true
     - OCI_ARTIFACT_SERVICE_HOST=http://oci-artifact-service:8083
    depends_on:
     - rebom-postgresql
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s
  rebom-postgresql:
    image: registry.relizahub.com/library/rearm-postgres:0.1.6@sha256:7c3d99ee4d4bbfb9a784f4e35e653aea07ebdf4ce32cd90f85fd888e717612ee
    environment:
     - POSTGRES_PASSWORD=${REBOM_PG_PASS:-relizaPass}
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    volumes:
      - "rebom-postgres-data:/relizaio/postgresql"
  rebom-postgres-init:
    image: docker.io/redgate/flyway:11.20.3-alpine@sha256:52cdd559dc8ae38a17b56615e3c7137d9b01470271112525b40373de470bb005
    restart: on-failure
    depends_on:
      - rebom-postgresql
    command:
      [
        '-url=jdbc:postgresql://rebom-postgresql:5432/postgres',
        '-user=postgres',
        '-password=${REBOM_PG_PASS:-relizaPass}',
        '-defaultSchema=rebom',
        '-schemas=rebom',
        'migrate'
      ]
    volumes:
      - ./rebom-migrations:/flyway/sql
  traefik:
    # TLS front, enabled with: docker compose --profile tls up -d
    # Required for any non-localhost deployment: browsers only expose the
    # Web Crypto API (needed by the login flow) in secure contexts, i.e.
    # https or localhost. Serves a self-signed certificate by default
    # (browser warning; fine for IP-based evals); set REARM_ACME_EMAIL and
    # a real REARM_TLS_HOST domain on default ports for Let's Encrypt.
    image: traefik:v3.7.8@sha256:5cb000ad823bfcfff911e22a4c4fa09cee74c7a2d960c012a1a46a8d0a159fcf
    profiles: ["tls"]
    command:
     - --entrypoints.websecure.address=:443
     - --entrypoints.web.address=:80
     # http -> https redirect. NB: the redirect targets the standard port;
     # with a non-443 REARM_TLS_PORT just use the https URL directly.
     - --entrypoints.web.http.redirections.entrypoint.to=websecure
     - --entrypoints.web.http.redirections.entrypoint.scheme=https
     # watch=false: the dynamic config is static for this deployment, and
     # disabling the watcher avoids failing on hosts with exhausted
     # inotify instances (the watcher error otherwise leaves traefik
     # routerless, answering 404 to everything).
     - --providers.file.filename=/etc/traefik/dynamic.yml
     - --providers.file.watch=false
     - --certificatesresolvers.le.acme.email=${REARM_ACME_EMAIL:-noreply@example.com}
     - --certificatesresolvers.le.acme.storage=/data/acme.json
     - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
    ports:
     - "${REARM_TLS_PORT:-443}:443"
     # Port 80 is used for the ACME http challenge and http->https redirect.
     - "${REARM_TLS_HTTP_PORT:-80}:80"
    environment:
     # Consumed by the go-template conditionals in traefik-dynamic.yml.
     - REARM_TLS_HOST=${REARM_TLS_HOST:-localhost}
     - REARM_ACME_EMAIL=${REARM_ACME_EMAIL:-}
    volumes:
     - ./traefik-dynamic.yml:/etc/traefik/dynamic.yml:ro
     - traefik-data:/data
    depends_on:
     - rearm-ui
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
volumes:
  rearm-keycloak-compose-postgres-data:
    driver: local
  rearm-zot-auth:
    driver: local
  rearm-zot-data:
    driver: local
  rearm-postgres-data:
    driver: local
  rebom-postgres-data:
    driver: local
  traefik-data:
    driver: local
